<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>座席定義</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            border: 1px solid #ccc;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        img {
            display: block;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

    <h1>座席定義ページ</h1>
    <p>動画の最初のフレームに対して、座席領域をドラッグで指定してください。</p>

    <div class="canvas-container" id="container">
        <img id="firstFrameImg" src="/api/get_first_frame" alt="最初のフレーム">
        <canvas id="seatCanvas"></canvas>
    </div>

    <div>
        <button id="saveBtn">保存して空席可視化へ進む</button>
        <div id="message"></div>
    </div>

    <script>
        const img = document.getElementById('firstFrameImg');
        const canvas = document.getElementById('seatCanvas');
        const ctx = canvas.getContext('2d');
        let seats = [];

        let startX, startY, isDrawing = false;

        img.onload = () => {
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            drawAllSeats();
        };

        canvas.addEventListener('mousedown', (e) => {
            startX = e.offsetX;
            startY = e.offsetY;
            isDrawing = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const x = e.offsetX;
            const y = e.offsetY;
            drawAllSeats();
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, x - startX, y - startY);
        });

        canvas.addEventListener('mouseup', (e) => {
            isDrawing = false;
            const endX = e.offsetX;
            const endY = e.offsetY;

            if (Math.abs(endX - startX) < 5 || Math.abs(endY - startY) < 5) return;

            // スケーリング補正
            const scaleX = img.naturalWidth / canvas.width;
            const scaleY = img.naturalHeight / canvas.height;

            const rect = [
                Math.round(Math.min(startX, endX) * scaleX),
                Math.round(Math.min(startY, endY) * scaleY),
                Math.round(Math.max(startX, endX) * scaleX),
                Math.round(Math.max(startY, endY) * scaleY)
            ];
            seats.push(rect);
            drawAllSeats();
        });

        function drawAllSeats() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const scaleX = canvas.width / img.naturalWidth;
            const scaleY = canvas.height / img.naturalHeight;
            ctx.strokeStyle = 'lime';
            ctx.lineWidth = 2;
            seats.forEach(([x1, y1, x2, y2]) => {
                ctx.strokeRect(x1 * scaleX, y1 * scaleY, (x2 - x1) * scaleX, (y2 - y1) * scaleY);
            });
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            if (seats.length === 0) {
                document.getElementById('message').textContent = '座席を少なくとも1つ定義してください。';
                return;
            }

            const payload = { seat_definitions: {} };
            seats.forEach((coords, i) => {
                payload.seat_definitions[`seat_${i + 1}`] = coords;
            });

            try {
                const res = await fetch('/api/save_seat_definitions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();
                if (result.success) {
                    document.getElementById('message').textContent = '保存成功。空席可視化ページに移動します...';
                    setTimeout(() => {
                        window.location.href = '/'; // または '/index'
                    }, 1000);
                } else {
                    document.getElementById('message').textContent = '保存に失敗しました。';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('message').textContent = '通信エラーが発生しました。';
            }
        });
    </script>
</body>

</html>
